# tomeforge as an HTTP conversion sidecar, plus an optional local OCR backend.
#
#   docker compose up -d --build            # the tomeforge service on :8400
#   docker compose --profile ocr up -d      # also start a local Ollama for scanned PDFs
#
# Convert via the API:
#   curl -F file=@book.pdf http://localhost:8400/convert
#   # scanned PDF with the bundled OCR backend:
#   curl -F file=@scan.pdf -F ocr=always -F ollama_host=http://ollama:11434 \
#        http://localhost:8400/convert
#
# OCR on CPU is slow (minutes per page). For real workloads point ollama_host at a
# GPU box (NVIDIA, or AMD via ROCm) instead of the `ocr` profile, and override the
# model with `OCR_MODEL=qwen2.5vl:3b`.
services:
  tomeforge:
    build: .
    image: tomeforge:latest
    container_name: tomeforge
    restart: unless-stopped
    ports:
      - "8400:8400"

  ollama:
    image: ollama/ollama
    container_name: tomeforge-ollama
    profiles: ["ocr"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=2h
      - OCR_MODEL=${OCR_MODEL:-deepseek-ocr:3b}
    # Pull the model on first start (cached in the volume), then serve.
    # `$$OCR_MODEL` escapes Compose interpolation so the container shell expands it.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - ollama serve & until ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull "$$OCR_MODEL"; wait
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
