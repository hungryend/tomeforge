# CI for tomeforge — lint + test the package, build the sidecar image, Trivy-scan
# it, and (only on push to main) publish it to GHCR.
#
# Pipeline:
#   * Pull request to main: lint-test + docker build + Trivy scan (no publish).
#   * Push to main (a merged PR): the above, then auto-tag a release and push the
#     image to ghcr.io/<owner>/tomeforge as :latest, :vX.Y.Z and :sha-<short>.
#
# Notes:
#   * No frontend job — tomeforge is a pure Python CLI/library + FastAPI sidecar.
#   * uv.lock is gitignored, so `uv sync` resolves fresh (no --frozen) and the cache
#     keys on pyproject.toml. Installs the dev + service extras.
#   * The vendored src/tomeforge/pdf2md.py is kept verbatim for easy upstream
#     re-sync, so it's excluded from the `ruff format` gate (and from lint via the
#     pyproject per-file-ignores).
#   * Tests need no system Calibre — they importorskip fitz/fastapi/httpx and stub
#     the Calibre EPUB step.
#   * The GHCR package is private by default; make it public (or authenticate your
#     puller) to pull the image elsewhere.

name: CI

on:
  # Markdown-only changes (README, docs) don't affect the image, so skip the whole
  # pipeline for them — no needless Calibre build, and no release cut for a doc edit.
  push:
    branches: [main]
    paths-ignore: ['**.md']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md']
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # for Trivy SARIF upload

jobs:
  lint-test:
    name: Lint + test (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          # No committed uv.lock (it's gitignored) — key the cache on pyproject.toml.
          cache-dependency-glob: "pyproject.toml"

      - name: Sync deps (dev + service extras)
        # No --frozen: resolves fresh since uv.lock isn't committed. Installs the
        # project + PyMuPDF + dev (pytest/ruff/Pillow/httpx) + service (fastapi/uvicorn).
        run: uv sync --extra dev --extra service

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        # Exclude the vendored pdf2md.py — kept verbatim from upstream (see the
        # per-file-ignores in pyproject); we don't enforce our format on it.
        run: uv run ruff format --check . --exclude src/tomeforge/pdf2md.py

      - name: Pytest
        # Tests importorskip fitz/fastapi/httpx (provided by the extras above) and
        # stub the Calibre EPUB step, so the whole suite runs with no system Calibre.
        run: uv run pytest -q

      - name: Export resolved requirements
        run: uv export --no-hashes --no-emit-project --output-file requirements.export.txt

      - name: pip-audit (resolved deps)
        run: uvx pip-audit --requirement requirements.export.txt --strict
        continue-on-error: true
        # continue-on-error for now — flip off after the first clean run so CVEs
        # actually block CI. Dependabot is the primary remediation channel.

  docker-build-scan:
    name: Docker build + Trivy scan
    runs-on: ubuntu-latest
    needs: [lint-test]
    timeout-minutes: 30   # the image apt-installs Calibre (heavy) on a cold cache
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: tomeforge:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: tomeforge:ci-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'        # surface findings in Code Scanning; don't fail here

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  publish:
    name: Publish image (GHCR)
    runs-on: ubuntu-latest
    needs: [docker-build-scan]
    # Only on merge to main (push), never on PRs / forks. Fork PRs have no
    # package-write token and we never publish un-reviewed code.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    permissions:
      contents: write   # create the version tag + GitHub release
      packages: write   # push the image to ghcr.io via the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags so the version bump can read prior tags

      - uses: docker/setup-buildx-action@v3

      # Rebuild from the gha cache (a cache hit — the scan job just populated it),
      # load locally so we gate on a clean Trivy scan BEFORE tagging/publishing.
      - name: Build for scan (cache hit)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: tomeforge:publish-${{ github.sha }}
          cache-from: type=gha

      - name: Trivy gate (block publish on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: tomeforge:publish-${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      # Auto-version from conventional-commit messages since the last tag
      # (feat -> minor, fix -> patch, BREAKING CHANGE / "!" -> major; default
      # patch). Creates + pushes the vX.Y.Z git tag. Runs only after a clean scan
      # so we never tag a release we didn't publish. Tag pushes don't re-trigger
      # CI (the push trigger is filtered to branches: [main]).
      - name: Bump version + create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: GitHub release (auto changelog)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

      - name: Docker metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Owner-agnostic: resolves to ghcr.io/<owner>/tomeforge for whatever
          # account owns the repo (hungryend now, sipador after the migration).
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.tag.outputs.new_version }}
            type=sha,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          provenance: false
